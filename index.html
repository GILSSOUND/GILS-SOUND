<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GILS SOUND | 프리미엄 AI 뮤직 스튜디오</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #D4AF37;
            --bg-glass: rgba(15, 15, 15, 0.75);
            --text-main: #F9FAFB;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans KR', sans-serif; }
        body {
            background-image: url('2.한국인/여자/indie_kr_woman_1_1778646998075.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.8), rgba(0,0,0,0.4));
            backdrop-filter: blur(15px); z-index: -1;
        }
        .hero-card {
            background: var(--bg-glass);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 24px;
            padding: 60px 40px;
            text-align: center;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            animation: slideUp 1s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 52px;
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(to right, #fff, #D4AF37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }
        .subtitle {
            font-size: 16px; color: #D1D5DB; font-weight: 300; line-height: 1.6; margin-bottom: 40px;
        }
        .btn-start {
            display: inline-block;
            background: linear-gradient(135deg, #D4AF37, #AA8022);
            color: #000;
            text-decoration: none;
            padding: 18px 30px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.3);
            transition: all 0.3s;
            width: 100%;
        }
        .btn-start:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.5);
        }
        
        @media (max-width: 768px) {
            .logo { font-size: 40px; }
            .subtitle { font-size: 14px; }
            .hero-card { padding: 40px 25px; }
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="hero-card">
        <div class="logo">GILS SOUND</div>
        <div class="subtitle">단 몇 번의 클릭으로 당신만의 완벽한 음악을.<br>지금 가입하고 AI가 작곡한 프리미엄 사운드를 경험하세요.</div>
        <a href="login.html" class="btn-start">지금 회원가입하기 (3곡 무료)</a>
    </div>
    
    <script>
        // 만약 이미 로그인 되어 있다면 로그인 과정을 스킵하고 메인으로 이동
        if (localStorage.getItem('gils_user')) {
            window.location.href = 'music_maker.html';
        }
    </script>
</body>
</html>
