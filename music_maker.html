        async function downloadSong(audioUrl, title) {
            const userAgent = navigator.userAgent.toLowerCase();
            if (userAgent.indexOf("kakaotalk") > -1 || userAgent.indexOf("instagram") > -1 || userAgent.indexOf("line") > -1 || userAgent.indexOf("inapp") > -1) {

                const response = await fetch(audioUrl);

                const a = document.createElement('a');
