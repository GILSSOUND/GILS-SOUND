<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GILS SOUND | 소셜 로그인</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <!-- 소셜 로그인 SDK -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/1.43.1/kakao.min.js"></script>
    <script src="https://static.nid.naver.com/js/naveridlogin_js_sdk_2.0.2.js" charset="utf-8"></script>

    <style>
        :root {
            --primary-gold: #D4AF37;
            --bg-glass: rgba(15, 15, 15, 0.75);
            --border-glass: rgba(255, 255, 255, 0.15);
            --text-main: #F9FAFB;
            --text-muted: #9CA3AF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Sans KR', sans-serif;
        }

        body {
            background-image: url('2.한국인/여자/indie_kr_woman_1_1778646998075.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.8), rgba(0,0,0,0.4));
            backdrop-filter: blur(15px);
            z-index: -1;
        }

        .auth-card {
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            padding: 50px 40px;
            backdrop-filter: blur(20px);
            animation: slideUp 0.8s ease-out;
            position: relative;
            z-index: 1;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .logo {
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(to right, #fff, #D4AF37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            font-size: 14px;
            font-weight: 300;
            color: #D1D5DB;
            letter-spacing: 1px;
            margin-bottom: 40px;
            line-height: 1.5;
        }

        .social-btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
            transition: all 0.3s;
            border: none;
            position: relative;
            overflow: hidden;
        }

        .social-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .btn-google {
            background: #ffffff;
            color: #333333;
            border: 1px solid #ddd;
        }

        .btn-kakao {
            background: #FEE500;
            color: #000000;
        }

        .btn-naver {
            background: #03C75A;
            color: #ffffff;
        }

        .social-icon {
            width: 20px;
            height: 20px;
        }

        /* 구글 기본 렌더링 버튼 숨기기 (커스텀 버튼 사용 위해) */
        #google-btn-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        
        /* 네이버 버튼 숨기기 */
        #naverIdLogin {
            display: none;
        }

    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="auth-card">
        <div class="logo">GILS SOUND</div>
        <div class="subtitle">프리미엄 AI 뮤직 스튜디오<br>단 1초 만에 로그인하세요.</div>

        <!-- 카카오 로그인 -->
        <button class="social-btn btn-kakao" onclick="loginWithKakao()">
            <svg class="social-icon" viewBox="0 0 24 24">
                <path fill="#000000" d="M12 3c-5.52 0-10 3.58-10 8 0 2.85 1.83 5.35 4.63 6.8-.23.82-.82 2.97-.85 3.09-.04.14.04.28.17.33.05.02.1.03.14.03.07 0 .14-.02.2-.07 1.19-.94 3.42-2.5 3.93-2.86.58.09 1.17.13 1.78.13 5.52 0 10-3.58 10-8s-4.48-8-10-8z"/>
            </svg>
            카카오 계정으로 시작하기
        </button>

        <!-- 네이버 로그인 -->
        <button class="social-btn btn-naver" onclick="loginWithNaver()">
            <svg class="social-icon" viewBox="0 0 24 24">
                <path fill="#ffffff" d="M16.273 12.845L7.376 0H0v24h7.727V11.155L16.624 24H24V0h-7.727v12.845z"/>
            </svg>
            네이버 계정으로 시작하기
        </button>
        <div id="naverIdLogin"></div>

        <!-- 구글 로그인 (표준 OAuth) -->
        <button class="social-btn btn-google" onclick="loginWithGoogle()">
            <svg class="social-icon" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                <path fill="none" d="M1 1h22v22H1z"/>
            </svg>
            구글 계정으로 시작하기
        </button>

    </div>

    <script>
        // ==========================================
        // 🔑 [필독] 발급받은 API 키를 여기에 입력하세요!
        // ==========================================
        const KAKAO_JAVASCRIPT_KEY = "71152f0f5bebe8e5723b2859888b4a15"; 
        const NAVER_CLIENT_ID = "3t2NSIAUxeFuYeNBG4uz";
        const GOOGLE_CLIENT_ID = "714178334730-l0bdt808735qm2pasm26lnou5i5chaud.apps.googleusercontent.com";

        // 공통 로그인 성공 처리 함수
        function handleLoginSuccess(platform, email, nickname) {
            let displayUser = "";
            
            // 카카오는 이메일이 없는 경우가 많아 번호가 뜨므로 닉네임 우선 표시
            if (platform === "카카오") {
                displayUser = `[카카오] ${nickname || "카카오 회원"}`;
            } else {
                // 네이버 계정이 구글 이메일로 가입된 경우 혼동을 막기 위해 앞에 플랫폼 명시
                displayUser = `[${platform}] ${email || nickname || "회원"}`;
            }

            localStorage.setItem('gils_user', displayUser);
            localStorage.setItem('gils_platform', platform); // 닉네임 변경 시 사용하기 위해 플랫폼 따로 저장

            if (!localStorage.getItem('gils_credits')) {
                // 신규 가입 시 3코인 지급 및 신규 회원 환영 플래그 저장
                localStorage.setItem('gils_credits', 3);
                localStorage.setItem('gils_is_new_user', 'true');
            }
            
            // 네이버처럼 팝업으로 열린 경우, 팝업을 닫고 부모(원래) 창을 이동시킴
            if (window.opener && !window.opener.closed) {
                window.opener.location.href = 'music_maker.html';
                window.close();
            } else {
                window.location.href = 'music_maker.html';
            }
        }

        // ==========================================
        // 1. 카카오 로그인 설정
        // ==========================================
        function loginWithKakao() {
            if (KAKAO_JAVASCRIPT_KEY === "YOUR_KAKAO_JAVASCRIPT_KEY") {
                alert("카카오 JavaScript 키가 입력되지 않았습니다.");
                return;
            }

            try {
                if (!Kakao.isInitialized()) {
                    Kakao.init(KAKAO_JAVASCRIPT_KEY);
                }
                
                Kakao.Auth.login({
                    success: function(authObj) {
                        Kakao.API.request({
                            url: '/v2/user/me',
                            success: function(res) {
                                try {
                                    const account = res.kakao_account || {};
                                    const profile = account.profile || {};
                                    
                                    // 이메일 동의를 안 했거나 정보가 없을 경우를 대비한 기본값
                                    const email = account.email || `kakao_${res.id}@kakao.com`;
                                    const nickname = profile.nickname || "카카오 유저";
                                    
                                    handleLoginSuccess("카카오", email, nickname);
                                } catch(e) {
                                    alert("카카오 로그인 데이터 처리 중 에러: " + e.message);
                                }
                            },
                            fail: function(error) {
                                alert("유저 정보를 가져오는데 실패했습니다: " + JSON.stringify(error));
                            }
                        });
                    },
                    fail: function(err) {
                        alert("카카오 팝업창 에러 또는 닫힘: " + JSON.stringify(err));
                    }
                });
            } catch (e) {
                alert("카카오 실행 중 에러가 발생했습니다: " + e.message + "\n(도메인 설정이 잘못되었거나 키가 틀렸을 수 있습니다.)");
            }
        }

        // ==========================================
        // 2. 구글 로그인 설정 (표준 OAuth 리디렉션 방식)
        // ==========================================
        function loginWithGoogle() {
            if (GOOGLE_CLIENT_ID === "YOUR_GOOGLE_CLIENT_ID") {
                alert("구글 Client ID가 입력되지 않았습니다.");
                return;
            }
            
            // 콜백 시 구글인지 네이버인지 명확히 구분하기 위해 세션에 기록
            sessionStorage.setItem('gils_login_provider', 'google');
            
            // ?나 # 뒤의 지저분한 파라미터를 싹 지운 아주 깨끗한 기본 주소만 추출
            const cleanUrl = window.location.origin + window.location.pathname;
            const redirectUri = encodeURIComponent(cleanUrl);
            
            const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${GOOGLE_CLIENT_ID}&redirect_uri=${redirectUri}&response_type=token&scope=email%20profile`;
            
            // 구글 로그인 창으로 이동
            window.location.href = authUrl;
        }

        // ==========================================
        // 3. 네이버 및 구글 콜백(토큰) 처리
        // ==========================================
        function loginWithNaver() {
            if (NAVER_CLIENT_ID === "YOUR_NAVER_CLIENT_ID") {
                alert("네이버 Client ID가 입력되지 않았습니다. 네이버 개발자 센터에서 발급받은 키를 login.html 코드에 넣어주세요!");
                // 임시 테스트용
                handleLoginSuccess("네이버");
                return;
            }
            
            // 네이버는 팝업을 사용하므로 세션 기록 불필요 (단일 팝업)
            sessionStorage.removeItem('gils_login_provider');
            
            // 네이버 로그인 버튼 클릭 시 숨겨진 네이버 버튼을 클릭하도록 트리거
            const naverLoginBtn = document.querySelector('#naverIdLogin a');
            if (naverLoginBtn) {
                naverLoginBtn.click();
            }
        }

        // 네이버 SDK 초기화
        if (NAVER_CLIENT_ID !== "YOUR_NAVER_CLIENT_ID") {
            const naverLogin = new naver.LoginWithNaverId({
                clientId: NAVER_CLIENT_ID,
                callbackUrl: window.location.href, // 로그인 후 돌아올 주소
                isPopup: true, // 팝업으로 로그인
                loginButton: {color: "green", type: 3, height: 60} // 숨겨진 버튼 설정
            });
            naverLogin.init();

            // 콜백 처리 (네이버 및 구글)
            window.addEventListener('load', function () {
                const hash = window.location.hash;
                if (hash.includes('access_token')) {
                    // 구글 로그인으로 출발했던 경우
                    if (sessionStorage.getItem('gils_login_provider') === 'google') {
                        sessionStorage.removeItem('gils_login_provider'); // 초기화
                        const params = new URLSearchParams(hash.substring(1));
                        const accessToken = params.get('access_token');
                        
                        // 구글 사용자 정보 가져오기
                        fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                            headers: { Authorization: `Bearer ${accessToken}` }
                        })
                        .then(res => res.json())
                        .then(data => {
                            if (data.email) {
                                handleLoginSuccess("구글", data.email, data.name);
                            }
                        })
                        .catch(err => alert("구글 사용자 정보를 가져오는 데 실패했습니다."));
                        return;
                    }

                    // 구글이 아니면 네이버 팝업 콜백으로 간주
                    naverLogin.getLoginStatus(function (status) {
                        if (status) {
                            const email = naverLogin.user.getEmail();
                            const nickname = naverLogin.user.getNickName();
                            handleLoginSuccess("네이버", email, nickname);
                        }
                    });
                }
            });
        }
    </script>
</body>
</html>
