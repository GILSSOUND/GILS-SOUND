<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GILS SOUND | 소셜 로그인</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <!-- 소셜 로그인 SDK -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/1.43.1/kakao.min.js"></script>
    <script src="https://static.nid.naver.com/js/naveridlogin_js_sdk_2.0.2.js" charset="utf-8"></script>
    <!-- 다국어 지원 스크립트 -->
    <script src="translations.js"></script>

    <style>
        :root {
            --primary-gold: #D4AF37;
            --bg-glass: rgba(15, 15, 15, 0.75);
            --border-glass: rgba(255, 255, 255, 0.15);
            --text-main: #F9FAFB;
            --text-muted: #9CA3AF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Sans KR', sans-serif;
        }

        body {
            background-image: url('2.한국인/여자/indie_kr_woman_1_1778646998075.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.8), rgba(0,0,0,0.4));
            backdrop-filter: blur(15px);
            z-index: -1;
        }

        .auth-card {
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            padding: 50px 40px;
            backdrop-filter: blur(20px);
            animation: slideUp 0.8s ease-out;
            position: relative;
            z-index: 1;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .logo {
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(to right, #fff, #D4AF37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            font-size: 14px;
            font-weight: 300;
            color: #D1D5DB;
            letter-spacing: 1px;
            margin-bottom: 40px;
            line-height: 1.5;
        }

        .social-btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
            transition: all 0.3s;
            border: none;
            position: relative;
            overflow: hidden;
        }

        .social-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .btn-google {
            background: #ffffff;
            color: #333333;
            border: 1px solid #ddd;
        }

        .btn-kakao {
            background: #FEE500;
            color: #000000;
        }

        .btn-naver {
            background: #03C75A;
            color: #ffffff;
        }

        .social-icon {
            width: 20px;
            height: 20px;
        }

        /* 구글 기본 렌더링 버튼 숨기기 (커스텀 버튼 사용 위해) */
        #google-btn-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        
        /* 네이버 버튼 숨기기 */
        #naverIdLogin {
            display: none;
        }

    </style>
</head>
<body>
    <!-- 언어 선택기 제거 (하단 이동) -->

    <div class="overlay"></div>

    <div class="auth-card">
        <div class="logo" data-i18n="logo_title">GILS SOUND</div>
        <div class="subtitle" data-i18n="login_subtitle">프리미엄 AI 뮤직 스튜디오<br>단 1초 만에 로그인하세요.</div>

        <!-- 카카오 로그인 -->
        <button class="social-btn btn-kakao" onclick="loginWithKakao()">
            <svg class="social-icon" viewBox="0 0 24 24">
                <path fill="#000000" d="M12 3c-5.52 0-10 3.58-10 8 0 2.85 1.83 5.35 4.63 6.8-.23.82-.82 2.97-.85 3.09-.04.14.04.28.17.33.05.02.1.03.14.03.07 0 .14-.02.2-.07 1.19-.94 3.42-2.5 3.93-2.86.58.09 1.17.13 1.78.13 5.52 0 10-3.58 10-8s-4.48-8-10-8z"/>
            </svg>
            <span data-i18n="login_kakao">카카오 계정으로 시작하기</span>
        </button>

        <!-- 네이버 로그인 -->
        <button class="social-btn btn-naver" onclick="loginWithNaver()">
            <svg class="social-icon" viewBox="0 0 24 24">
                <path fill="#ffffff" d="M16.273 12.845L7.376 0H0v24h7.727V11.155L16.624 24H24V0h-7.727v12.845z"/>
            </svg>
            <span data-i18n="login_naver">네이버 계정으로 시작하기</span>
        </button>
        <div id="naverIdLogin"></div>

        <!-- 구글 로그인 (표준 OAuth) -->
        <button class="social-btn btn-google" onclick="loginWithGoogle()">
            <svg class="social-icon" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                <path fill="none" d="M1 1h22v22H1z"/>
            </svg>
            <span data-i18n="login_google">구글 계정으로 시작하기</span>
        </button>

        <div style="margin-top: 30px; text-align: center;">
            <select class="lang-selector" style="background: rgba(0,0,0,0.5); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 5px 10px; border-radius: 5px; cursor: pointer;">
                <option value="ko">한국어</option>
                <option value="en">English</option>
                <option value="ja">日本語</option>
                <option value="zh">中文</option>
                <option value="es">Español</option>
                <option value="fr">Français</option>
                <option value="de">Deutsch</option>
                <option value="pt">Português</option>
                <option value="vi">Tiếng Việt</option>
                <option value="id">Bahasa Ind.</option>
            </select>
        </div>
    </div>

    <script>
        // ==========================================
        // 🔑 [필독] 발급받은 API 키를 여기에 입력하세요!
        // ==========================================
        const KAKAO_JAVASCRIPT_KEY = "71152f0f5bebe8e5723b2859888b4a15"; 
        const NAVER_CLIENT_ID = "3t2NSIAUxeFuYeNBG4uz";
        const GOOGLE_CLIENT_ID = "714178334730-l0bdt808735qm2pasm26lnou5i5chaud.apps.googleusercontent.com";

        // 공통 로그인 성공 처리 함수
        async function handleLoginSuccess(platform, email, nickname) {
            let displayUser = "";
            let userId = "";
            
            // 유저 고유 ID 생성 (이메일이 없으면 닉네임이나 타임스탬프 활용)
            const uniqueKey = email || nickname || Date.now().toString();
            userId = `${platform}_${uniqueKey}`;

            if (platform === "카카오") {
                displayUser = `[카카오] ${nickname || "카카오 회원"}`;
            } else {
                displayUser = `[${platform}] ${email || nickname || "회원"}`;
            }

            try {
                // 1. 서버 DB에 유저 정보 동기화 요청
                const response = await fetch('/api/user/sync', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, platform, nickname: displayUser })
                });
                const data = await response.json();
                
                if (data.success) {
                    // 2. 서버에서 받은 '진짜' 크레딧과 정보를 로컬에 저장 (화면 표시용)
                    localStorage.setItem('gils_userId', userId);
                    localStorage.setItem('gils_user', data.user.nickname || displayUser);
                    localStorage.setItem('gils_platform', platform);
                    localStorage.setItem('gils_credits', data.user.credits);
                    
                    // 만약 닉네임이 기본 설정 상태라면 첫 가입자로 간주하여 팝업을 띄우기 위함
                    if (!localStorage.getItem('gils_is_new_user_done') && data.user.credits === 3) {
                        localStorage.setItem('gils_is_new_user', 'true');
                    }

                    // 3. 화면 이동
                    if (window.opener && !window.opener.closed) {
                        window.opener.location.href = 'music_maker.html';
                        window.close();
                    } else {
                        window.location.href = 'music_maker.html';
                    }
                } else {
                    alert("서버 로그인 동기화 실패: " + data.error);
                }
            } catch (error) {
                alert("서버 통신 에러: " + error.message);
            }
        }

        // ==========================================
        // 1. 카카오 로그인 설정
        // ==========================================
        function loginWithKakao() {
            if (KAKAO_JAVASCRIPT_KEY === "YOUR_KAKAO_JAVASCRIPT_KEY") {
                alert("카카오 JavaScript 키가 입력되지 않았습니다.");
                return;
            }

            try {
                if (!Kakao.isInitialized()) {
                    Kakao.init(KAKAO_JAVASCRIPT_KEY);
                }
                
                // 카카오 로그인 시 무조건 폼(계정 입력창)을 띄우는 전용 함수 사용
                Kakao.Auth.loginForm({
                    success: function(authObj) {
                        Kakao.API.request({
                            url: '/v2/user/me',
                            success: function(res) {
                                try {
                                    const account = res.kakao_account || {};
                                    const profile = account.profile || {};
                                    
                                    // 이메일 동의를 안 했거나 정보가 없을 경우를 대비한 기본값
                                    const email = account.email || `kakao_${res.id}@kakao.com`;
                                    const nickname = profile.nickname || "카카오 유저";
                                    
                                    handleLoginSuccess("카카오", email, nickname);
                                } catch(e) {
                                    alert("카카오 로그인 데이터 처리 중 에러: " + e.message);
                                }
                            },
                            fail: function(error) {
                                alert("유저 정보를 가져오는데 실패했습니다: " + JSON.stringify(error));
                            }
                        });
                    },
                    fail: function(err) {
                        alert("카카오 팝업창 에러 또는 닫힘: " + JSON.stringify(err));
                    }
                });
            } catch (e) {
                alert("카카오 실행 중 에러가 발생했습니다: " + e.message + "\n(도메인 설정이 잘못되었거나 키가 틀렸을 수 있습니다.)");
            }
        }

        // ==========================================
        // 2. 구글 로그인 설정 (표준 OAuth 리디렉션 방식)
        // ==========================================
        function loginWithGoogle() {
            if (GOOGLE_CLIENT_ID === "YOUR_GOOGLE_CLIENT_ID") {
                alert("구글 Client ID가 입력되지 않았습니다.");
                return;
            }

            // 구글 '보안 브라우저 정책(403 disallowed_useragent)' 대응: 인앱 브라우저 강제 탈출
            const userAgent = navigator.userAgent.toLowerCase();
            if (userAgent.includes('kakaotalk')) {
                alert("카카오톡 브라우저에서는 구글 로그인이 차단되어 있습니다.\n확인을 누르시면 안전한 기본 웹브라우저(Safari/Chrome)로 자동 연결됩니다.");
                location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(window.location.href);
                return;
            } else if (userAgent.includes('line') || userAgent.includes('instagram') || userAgent.includes('naver')) {
                alert("구글 보안 정책으로 인해 현재 앱 내 브라우저에서는 로그인이 불가능합니다.\n화면 우측 하단의 [다른 브라우저(Safari/Chrome)로 열기]를 선택해 주세요.");
                return;
            }
            
            // 콜백 시 구글인지 네이버인지 명확히 구분하기 위해 세션에 기록
            sessionStorage.setItem('gils_login_provider', 'google');
            
            // ?나 # 뒤의 지저분한 파라미터를 싹 지운 아주 깨끗한 기본 주소만 추출
            const cleanUrl = window.location.origin + window.location.pathname;
            const redirectUri = encodeURIComponent(cleanUrl);
            
            // prompt=select_account 를 추가하여 매번 계정 선택 창 띄우기
            const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${GOOGLE_CLIENT_ID}&redirect_uri=${redirectUri}&response_type=token&scope=email%20profile&prompt=select_account`;
            
            // 구글 로그인 창으로 이동
            window.location.href = authUrl;
        }

        let globalNaverLogin = null;

        // ==========================================
        // 3. 네이버 및 구글 콜백(토큰) 처리
        // ==========================================
        function loginWithNaver() {
            if (NAVER_CLIENT_ID === "YOUR_NAVER_CLIENT_ID") {
                alert("네이버 Client ID가 입력되지 않았습니다. 네이버 개발자 센터에서 발급받은 키를 login.html 코드에 넣어주세요!");
                return;
            }
            
            sessionStorage.setItem('gils_login_provider', 'naver');
            
            if (globalNaverLogin) {
                // SDK의 내부 함수를 이용해 state가 포함된 안전한 인증 주소를 직접 생성
                let authUrl = globalNaverLogin.generateAuthorizeUrl();
                // 계정 선택창을 강제로 매번 띄우기 위해 auth_type=reprompt 파라미터 추가
                if (!authUrl.includes('auth_type=reprompt')) {
                    authUrl += "&auth_type=reprompt";
                }
                window.location.href = authUrl;
            } else {
                alert("네이버 로그인을 준비 중입니다. 잠시 후 다시 시도해주세요.");
            }
        }

        // 네이버 SDK 초기화
        if (NAVER_CLIENT_ID !== "YOUR_NAVER_CLIENT_ID") {
            const cleanUrl = window.location.origin + window.location.pathname; // 해시(#) 제거된 깨끗한 주소
            globalNaverLogin = new naver.LoginWithNaverId({
                clientId: NAVER_CLIENT_ID,
                callbackUrl: cleanUrl, // 로그인 후 돌아올 주소
                isPopup: false, // 팝업 대신 직접 리디렉션 사용
                loginButton: {color: "green", type: 3, height: 60} // 숨겨진 버튼 설정
            });
            globalNaverLogin.init();

            // 콜백 처리 (네이버 및 구글)
            window.addEventListener('load', function () {
                const hash = window.location.hash;
                if (hash.includes('access_token')) {
                    // 구글 로그인으로 출발했던 경우
                    if (sessionStorage.getItem('gils_login_provider') === 'google') {
                        sessionStorage.removeItem('gils_login_provider'); // 초기화
                        const params = new URLSearchParams(hash.substring(1));
                        const accessToken = params.get('access_token');
                        
                        // 구글 사용자 정보 가져오기
                        fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
                            headers: { Authorization: `Bearer ${accessToken}` }
                        })
                        .then(res => res.json())
                        .then(data => {
                            if (data.email) {
                                handleLoginSuccess("구글", data.email, data.name);
                            }
                        })
                        .catch(err => alert("구글 사용자 정보를 가져오는 데 실패했습니다."));
                        return;
                    }

                    // 구글이 아니면 네이버 콜백으로 간주
                    globalNaverLogin.getLoginStatus(function (status) {
                        if (status) {
                            const naverId = globalNaverLogin.user.getId();
                            const email = globalNaverLogin.user.getEmail() || `naver_${naverId}@naver.com`;
                            const nickname = globalNaverLogin.user.getNickName() || "네이버 유저";
                            handleLoginSuccess("네이버", email, nickname);
                        } else {
                            alert("네이버 로그인 인증은 완료되었으나 프로필 정보를 불러오지 못했습니다. 잠시 후 다시 시도해 주세요.");
                        }
                    });
                }
            });
        }
    </script>
</body>
</html>
