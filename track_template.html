<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>__OG_TITLE__ | GILS SOUND</title>
    
    <!-- Open Graph Tags for Sharing -->
    <meta property="og:title" content="__OG_TITLE__">
    <meta property="og:description" content="__OG_DESCRIPTION__">
    <meta property="og:image" content="__OG_IMAGE__">
    <meta property="og:url" content="__OG_URL__">
    <meta property="og:type" content="music.song">

    <!-- Fonts and Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-gold: #D4AF37;
            --bg-color: #0A0A0A;
            --bg-glass: rgba(20, 20, 20, 0.6);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-muted: #9CA3AF;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(212, 175, 55, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(212, 175, 55, 0.05), transparent 25%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header .logo { font-size: 24px; font-weight: 800; color: var(--primary-gold); letter-spacing: 2px; }
        .header .subtitle { font-size: 13px; color: var(--text-muted); margin-top: 5px; }

        .player-card {
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            text-align: center;
            animation: slideUp 0.8s ease-out;
        }

        .cover-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 16px;
            background-size: cover;
            background-position: center;
            margin-bottom: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .song-title { font-size: 24px; font-weight: 800; margin-bottom: 8px; color: #fff; }
        .song-genre { font-size: 14px; color: var(--primary-gold); margin-bottom: 25px; font-weight: 500; }

        audio { width: 100%; border-radius: 12px; outline: none; margin-bottom: 20px; }
        audio::-webkit-media-controls-panel { background: rgba(255,255,255,0.1); }
        audio::-webkit-media-controls-current-time-display,
        audio::-webkit-media-controls-time-remaining-display { color: #fff; }

        .lyrics-box {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 15px;
            font-size: 13px;
            color: #D1D5DB;
            line-height: 1.8;
            max-height: 150px;
            overflow-y: auto;
            text-align: left;
            white-space: pre-line;
            margin-bottom: 25px;
        }

        .lyrics-box::-webkit-scrollbar { width: 6px; }
        .lyrics-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .btn-cta {
            background: linear-gradient(135deg, var(--primary-gold), #b5952f);
            color: #000;
            border: none;
            padding: 18px 24px;
            font-size: 16px;
            font-weight: 800;
            border-radius: 16px;
            cursor: pointer;
            width: 100%;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
            margin-bottom: 10px;
        }

        .btn-cta:hover { transform: translateY(-2px); box-shadow: 0 15px 25px rgba(212, 175, 55, 0.4); }
        
        .btn-download {
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 16px;
            cursor: pointer;
            width: 100%;
            display: inline-block;
            transition: all 0.3s;
        }
        
        .btn-download:hover { background: rgba(255,255,255,0.1); }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .loading {
            color: var(--primary-gold);
            font-size: 16px;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="header" style="cursor: pointer;" onclick="window.location.href='/'">
        <div class="logo">GILS SOUND</div>
        <div class="subtitle">프리미엄 AI 뮤직 프로덕션</div>
    </div>

    <div class="player-card" id="player-card">
        <div class="loading" id="loading-msg">음악 정보를 불러오는 중...</div>
        
        <div id="content" style="display: none;">
            <div class="cover-image" id="track-cover"></div>
            <h1 class="song-title" id="track-title">제목 없음</h1>
            <p class="song-genre" id="track-genre">장르 로딩중</p>
            
            <audio id="track-audio" controls controlsList="nodownload noplaybackrate"></audio>
            
            <div class="lyrics-box" id="track-lyrics">가사가 없습니다.</div>
            
            <a href="/" class="btn-cta">✨ 나도 무료로 AI 음악 만들기</a>
            <button class="btn-download" onclick="downloadSong()">💾 MP3 음원 다운로드</button>
        </div>
    </div>

    <!-- In-App Browser Warning Modal -->
    <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 7000; display: none; justify-content: center; align-items: center; padding: 20px;" id="inapp-browser-modal" onclick="if(event.target === this) this.style.display='none'">
        <div style="background: rgba(20, 20, 20, 0.95); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 28px; width: 100%; max-width: 400px; padding: 30px; text-align: center;">
            <div style="font-size: 40px; margin-bottom: 15px;">🚨</div>
            <h2 style="font-size: 20px; color: #D4AF37; line-height: 1.4;">카카오톡 브라우저 정책상<br>직접 다운로드가 제한되어 있습니다.</h2>
            <p style="margin-top: 15px; font-size: 14px; color: #D1D5DB; line-height: 1.6;">안전하고 원활한 파일 저장을 위해<br>기본 브라우저(Chrome, Safari 등)를 이용해 주세요.</p>
            
            <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 20px;">
                <button onclick="openExternalBrowser()" style="background: #D4AF37; color: #000; border: none; font-size: 15px; font-weight: bold; padding: 14px; border-radius: 12px; cursor: pointer; transition: 0.2s;">
                    🌐 다른 웹브라우저로 열기
                </button>
                <button onclick="document.getElementById('inapp-browser-modal').style.display='none'" style="background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); font-size: 15px; font-weight: bold; padding: 14px; border-radius: 12px; cursor: pointer; transition: 0.2s;">
                    닫기
                </button>
            </div>
        </div>
    </div>

    <script>
        const TRACK_ID = "__TRACK_ID__";
        let currentAudioUrl = '';
        let currentTitle = '';

        async function loadTrackInfo() {
            try {
                const res = await fetch(`/api/track/${TRACK_ID}`);
                const data = await res.json();
                
                if (data.success && data.song) {
                    const song = data.song;
                    currentAudioUrl = song.audioUrl;
                    currentTitle = song.title || 'GILS_SOUND_Music';
                    
                    document.getElementById('loading-msg').style.display = 'none';
                    document.getElementById('content').style.display = 'block';
                    
                    document.getElementById('track-title').innerText = song.title || 'GILS SOUND Original';
                    document.getElementById('track-genre').innerText = song.genreLabel || 'AI Music';
                    
                    let coverUrl = song.imageUrl || '2.한국인/여자/woman_influencer_2.png';
                    if (coverUrl && !coverUrl.startsWith('http')) {
                        coverUrl = '/' + coverUrl;
                    }
                    document.getElementById('track-cover').style.backgroundImage = `url('${coverUrl}')`;
                    
                    document.getElementById('track-audio').src = song.audioUrl;
                    
                    document.getElementById('track-lyrics').innerText = song.lyrics || '가사가 없습니다.';
                } else {
                    alert("곡을 찾을 수 없습니다.");
                    window.location.href = '/';
                }
            } catch (err) {
                console.error(err);
                alert("서버 연결 오류가 발생했습니다.");
                window.location.href = '/';
            }
        }

        function openExternalBrowser() {
            var targetUrl = window.location.href;
            try {
                const uid = localStorage.getItem('gils_userId');
                const uname = localStorage.getItem('gils_user');
                if (uid) {
                    const urlObj = new URL(targetUrl);
                    urlObj.searchParams.set('autoLoginId', uid);
                    if (uname) urlObj.searchParams.set('autoLoginNick', uname);
                    targetUrl = urlObj.toString();
                }
            } catch(e) {}

            var userAgent = navigator.userAgent.toLowerCase();
            if (userAgent.indexOf("kakaotalk") > -1) {
                location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(targetUrl);
            } else if (userAgent.indexOf("android") > -1) {
                location.href = 'intent://' + targetUrl.replace(/https?:\/\//i, '') + '#Intent;scheme=https;package=com.android.chrome;end';
            } else {
                alert('화면 하단 또는 상단의 [ ⋮ ] 메뉴 버튼을 눌러서\n👉 "다른 브라우저로 열기(Safari / Chrome)"를 선택해 주세요.');
            }
        }

        async function downloadSong() {
            if (!currentAudioUrl) return;
            const userAgent = navigator.userAgent.toLowerCase();
            if (userAgent.indexOf("kakaotalk") > -1 || userAgent.indexOf("instagram") > -1 || userAgent.indexOf("line") > -1 || userAgent.indexOf("inapp") > -1) {
                document.getElementById('inapp-browser-modal').style.display = 'flex';
                return;
            }

            try {
                const response = await fetch(currentAudioUrl);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = blobUrl;
                a.download = `${currentTitle}.mp3`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(blobUrl);
                document.body.removeChild(a);
            } catch (err) {
                window.open(currentAudioUrl, '_blank');
            }
        }

        // window.onload 대신 즉시 실행 (모바일 인앱 브라우저 호환성)
        loadTrackInfo();
    </script>
</body>
</html>
