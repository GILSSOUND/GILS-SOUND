<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GILS SOUND | 소셜 로그인</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <!-- 소셜 로그인 SDK -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"></script>
    <script src="https://static.nid.naver.com/js/naveridlogin_js_sdk_2.0.2.js" charset="utf-8"></script>

    <style>
        :root {
            --primary-gold: #D4AF37;
            --bg-glass: rgba(15, 15, 15, 0.75);
            --border-glass: rgba(255, 255, 255, 0.15);
            --text-main: #F9FAFB;
            --text-muted: #9CA3AF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Sans KR', sans-serif;
        }

        body {
            background-image: url('2.한국인/여자/indie_kr_woman_1_1778646998075.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.8), rgba(0,0,0,0.4));
            backdrop-filter: blur(15px);
            z-index: -1;
        }

        .auth-card {
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            padding: 50px 40px;
            backdrop-filter: blur(20px);
            animation: slideUp 0.8s ease-out;
            position: relative;
            z-index: 1;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .logo {
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(to right, #fff, #D4AF37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            font-size: 14px;
            font-weight: 300;
            color: #D1D5DB;
            letter-spacing: 1px;
            margin-bottom: 40px;
            line-height: 1.5;
        }

        .social-btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
            transition: all 0.3s;
            border: none;
            position: relative;
            overflow: hidden;
        }

        .social-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .btn-google {
            background: #ffffff;
            color: #333333;
            border: 1px solid #ddd;
        }

        .btn-kakao {
            background: #FEE500;
            color: #000000;
        }

        .btn-naver {
            background: #03C75A;
            color: #ffffff;
        }

        .social-icon {
            width: 20px;
            height: 20px;
        }

        /* 구글 기본 렌더링 버튼 숨기기 (커스텀 버튼 사용 위해) */
        #google-btn-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        
        /* 네이버 버튼 숨기기 */
        #naverIdLogin {
            display: none;
        }

    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="auth-card">
        <div class="logo">GILS SOUND</div>
        <div class="subtitle">프리미엄 AI 뮤직 스튜디오<br>단 1초 만에 로그인하세요.</div>

        <!-- 카카오 로그인 -->
        <button class="social-btn btn-kakao" onclick="loginWithKakao()">
            <svg class="social-icon" viewBox="0 0 24 24">
                <path fill="#000000" d="M12 3c-5.52 0-10 3.58-10 8 0 2.85 1.83 5.35 4.63 6.8-.23.82-.82 2.97-.85 3.09-.04.14.04.28.17.33.05.02.1.03.14.03.07 0 .14-.02.2-.07 1.19-.94 3.42-2.5 3.93-2.86.58.09 1.17.13 1.78.13 5.52 0 10-3.58 10-8s-4.48-8-10-8z"/>
            </svg>
            카카오 계정으로 시작하기
        </button>

        <!-- 네이버 로그인 -->
        <button class="social-btn btn-naver" onclick="loginWithNaver()">
            <svg class="social-icon" viewBox="0 0 24 24">
                <path fill="#ffffff" d="M16.273 12.845L7.376 0H0v24h7.727V11.155L16.624 24H24V0h-7.727v12.845z"/>
            </svg>
            네이버 계정으로 시작하기
        </button>
        <div id="naverIdLogin"></div>

        <!-- 구글 로그인 (커스텀 버튼 위에 투명한 기본 구글 버튼을 덮어씌움) -->
        <button class="social-btn btn-google" style="position: relative;">
            <svg class="social-icon" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                <path fill="none" d="M1 1h22v22H1z"/>
            </svg>
            구글 계정으로 시작하기
            <div id="google-btn-wrapper"></div>
        </button>

    </div>

    <script>
        // ==========================================
        // 🔑 [필독] 발급받은 API 키를 여기에 입력하세요!
        // ==========================================
        const KAKAO_JAVASCRIPT_KEY = "71152f0f5bebe8e5723b2859888b4a15"; 
        const NAVER_CLIENT_ID = "3t2NSIAUxeFuYeNBG4uz";
        const GOOGLE_CLIENT_ID = "714178334730-l0bdt808735qm2pasm26lnou5i5chaud.apps.googleusercontent.com";

        // 공통 로그인 성공 처리 함수
        function handleLoginSuccess(platform, email, nickname) {
            localStorage.setItem('gils_user', email || `${platform} User`);
            if (!localStorage.getItem('gils_credits')) {
                // 신규 가입 시 3코인 지급
                localStorage.setItem('gils_credits', 3);
                alert(`${platform} 계정으로 환영합니다! 3코인이 지급되었습니다.`);
            } else {
                alert(`${platform} 계정으로 로그인 되었습니다.`);
            }
            window.location.href = 'music_maker.html';
        }

        // ==========================================
        // 1. 카카오 로그인 설정
        // ==========================================
        function loginWithKakao() {
            if (KAKAO_JAVASCRIPT_KEY === "YOUR_KAKAO_JAVASCRIPT_KEY") {
                alert("카카오 JavaScript 키가 입력되지 않았습니다. 개발자 센터에서 발급받은 키를 login.html 코드에 넣어주세요!");
                // 임시 테스트용
                handleLoginSuccess("카카오");
                return;
            }

            if (!Kakao.isInitialized()) {
                Kakao.init(KAKAO_JAVASCRIPT_KEY);
            }
            
            Kakao.Auth.login({
                success: function(authObj) {
                    Kakao.API.request({
                        url: '/v2/user/me',
                        success: function(res) {
                            const email = res.kakao_account.email;
                            const nickname = res.kakao_account.profile.nickname;
                            handleLoginSuccess("카카오", email, nickname);
                        },
                        fail: function(error) {
                            alert("유저 정보를 가져오는데 실패했습니다: " + JSON.stringify(error));
                        }
                    });
                },
                fail: function(err) {
                    alert("카카오 로그인 실패: " + JSON.stringify(err));
                }
            });
        }

        // ==========================================
        // 2. 구글 로그인 설정
        // ==========================================
        window.onload = function () {
            if (GOOGLE_CLIENT_ID !== "YOUR_GOOGLE_CLIENT_ID") {
                google.accounts.id.initialize({
                    client_id: GOOGLE_CLIENT_ID,
                    callback: handleGoogleCredentialResponse
                });
                google.accounts.id.renderButton(
                    document.getElementById("google-btn-wrapper"),
                    { theme: "outline", size: "large", width: "100%" } // 투명하게 덮어씌움
                );
            } else {
                document.querySelector('.btn-google').addEventListener('click', () => {
                    alert("구글 Client ID가 입력되지 않았습니다. 개발자 콘솔에서 발급받은 키를 login.html 코드에 넣어주세요!");
                    // 임시 테스트용
                    handleLoginSuccess("구글");
                });
            }
        };

        function handleGoogleCredentialResponse(response) {
            // JWT 디코딩 (간단한 파싱)
            const base64Url = response.credential.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            
            const payload = JSON.parse(jsonPayload);
            handleLoginSuccess("구글", payload.email, payload.name);
        }

        // ==========================================
        // 3. 네이버 로그인 설정
        // ==========================================
        function loginWithNaver() {
            if (NAVER_CLIENT_ID === "YOUR_NAVER_CLIENT_ID") {
                alert("네이버 Client ID가 입력되지 않았습니다. 네이버 개발자 센터에서 발급받은 키를 login.html 코드에 넣어주세요!");
                // 임시 테스트용
                handleLoginSuccess("네이버");
                return;
            }
            
            // 네이버 로그인 버튼 클릭 시 숨겨진 네이버 버튼을 클릭하도록 트리거
            const naverLoginBtn = document.querySelector('#naverIdLogin a');
            if (naverLoginBtn) {
                naverLoginBtn.click();
            }
        }

        // 네이버 SDK 초기화
        if (NAVER_CLIENT_ID !== "YOUR_NAVER_CLIENT_ID") {
            const naverLogin = new naver.LoginWithNaverId({
                clientId: NAVER_CLIENT_ID,
                callbackUrl: window.location.href, // 로그인 후 돌아올 주소
                isPopup: true, // 팝업으로 로그인
                loginButton: {color: "green", type: 3, height: 60} // 숨겨진 버튼 설정
            });
            naverLogin.init();

            // 네이버 팝업에서 돌아왔을 때 상태 확인
            window.addEventListener('load', function () {
                naverLogin.getLoginStatus(function (status) {
                    if (status) {
                        const email = naverLogin.user.getEmail();
                        const nickname = naverLogin.user.getNickName();
                        handleLoginSuccess("네이버", email, nickname);
                    }
                });
            });
        }
    </script>
</body>
</html>
